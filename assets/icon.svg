<?xml version="1.0" encoding="UTF-8"?>
<!--
  proton-bridge-mcp placeholder icon (256x256).
  Hand-coded SVG. To regenerate the PNG:
      qlmanage -t -s 256 -o assets/ assets/icon.svg
      mv assets/icon.svg.png assets/icon.png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C4DFF"/>
      <stop offset="1" stop-color="#5B2BD9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Envelope -->
  <g filter="url(#shadow)">
    <rect x="48" y="80" width="160" height="112" rx="10" ry="10"
          fill="#FFFFFF" stroke="#FFFFFF" stroke-width="0"/>
    <!-- Flap -->
    <path d="M 48 90 L 128 152 L 208 90 L 208 80 L 48 80 Z"
          fill="#EDE7FF" stroke="#5B2BD9" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- Padlock badge bottom-right -->
  <g transform="translate(170,150)">
    <circle cx="28" cy="28" r="32" fill="#1F0F4D" stroke="#FFFFFF" stroke-width="3"/>
    <!-- Shackle -->
    <path d="M 18 24 V 18 a 10 10 0 0 1 20 0 V 24"
          fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="14" y="24" width="28" height="20" rx="3" ry="3" fill="#FFFFFF"/>
    <!-- Keyhole -->
    <circle cx="28" cy="32" r="2.5" fill="#1F0F4D"/>
    <rect x="27" y="32" width="2" height="6" fill="#1F0F4D"/>
  </g>
</svg>
