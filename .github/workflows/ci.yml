# Lightweight smoke-test + unit-test workflow.
#
# Four jobs, deliberately tight:
#   - syntax    : compileall the two Python modules across the supported floor
#                 (3.10) and the latest tested ceiling (3.14).
#   - manifests : parse all four JSON manifests and check the load-bearing
#                 top-level keys are present.
#   - lockfile  : create a clean venv and run `pip install --require-hashes`
#                 against the user-facing requirements.txt, to confirm the
#                 runtime lockfile resolves and hashes match.
#   - tests     : install requirements-dev.txt (a superset of the runtime
#                 lockfile, also hash-pinned) and run the pytest suite over
#                 the pure helpers in proton_bridge_mcp.py.
#
# The pytest suite covers only side-effect-free helpers (header decoding,
# address parsing, body extraction, IMAP-search criteria construction). It
# does not exercise IMAP/SMTP/Keychain paths, which need a running Bridge.
#
# Third-party actions are pinned to commit SHAs (not tags) so an action
# author cannot silently re-tag a release with new code -- a real
# supply-chain risk. The trailing comment after each `@<sha>` records the
# release tag the SHA corresponds to, for human readability. Dependabot
# (.github/dependabot.yml) opens weekly PRs to bump these pins; review the
# diff before merging. Both pinned versions run on Node.js 24, so this
# workflow does not surface the GitHub deprecation banner for Node 20.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax:
    name: Syntax (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile sources
        run: python -m compileall -q proton_bridge_mcp.py bootstrap.py

  manifests:
    name: Manifest JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Parse and structural-check manifests
        run: |
          python <<'PY'
          import json, sys
          from pathlib import Path

          # path -> required top-level keys
          required = {
              ".claude-plugin/plugin.json":      ["name", "version", "description", "author", "mcpServers"],
              ".claude-plugin/marketplace.json": ["name", "owner", "plugins"],
              ".mcp.json":                       ["mcpServers"],
              "server.json":                     ["name", "description", "version", "packages"],
          }

          failed = False
          for path, keys in required.items():
              p = Path(path)
              if not p.is_file():
                  print(f"MISSING: {path}")
                  failed = True
                  continue
              try:
                  data = json.loads(p.read_text())
              except json.JSONDecodeError as e:
                  print(f"INVALID JSON: {path}: {e}")
                  failed = True
                  continue
              missing = [k for k in keys if k not in data]
              if missing:
                  print(f"MISSING KEYS in {path}: {missing}")
                  failed = True
              else:
                  print(f"OK: {path}")

          sys.exit(1 if failed else 0)
          PY

  lockfile:
    name: Hash-locked install (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv and install with --require-hashes
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade --quiet pip
          .venv/bin/pip install --require-hashes --quiet -r requirements.txt
      - name: Import the runtime deps the server needs
        run: .venv/bin/python -c "import mcp.server.fastmcp, pydantic; print('imports ok')"

  tests:
    name: Pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv and install dev lockfile with --require-hashes
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade --quiet pip
          .venv/bin/pip install --require-hashes --quiet -r requirements-dev.txt
      - name: Run pytest
        run: .venv/bin/python -m pytest tests/ -v

  bandit:
    # Python SAST. Configuration (skips and exclude_dirs) lives in
    # `[tool.bandit]` in pyproject.toml; each skip there is justified
    # with a comment explaining why the category is universally noise
    # in this codebase.
    #
    # bandit is intentionally not pinned -- it's a security tool whose
    # value comes from staying current with new check categories. An
    # attacker compromising the bandit wheel to silence findings is a
    # theoretical concern but a real one only if bandit's release process
    # is breached, which is the kind of thing we'd hear about. Trade-off
    # accepted.
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install --quiet bandit
      - name: Run bandit
        run: bandit -c pyproject.toml -r proton_bridge_mcp.py bootstrap.py

  pip-audit:
    # PyPA Advisory Database vulnerability scan. Catches CVEs in the
    # locked transitive dependency graph that hash-pinning alone does
    # not (hash-pinning protects against tampered wheels, not against
    # known-vulnerable versions). Audits both the runtime lockfile and
    # the dev lockfile -- a vuln in a dev dep can compromise CI.
    #
    # `--strict` upgrades skipped advisories (e.g. for dependencies that
    # pip-audit cannot resolve) into failures, so a dependency change
    # that breaks the audit cannot silently slip through.
    name: pip-audit (PyPA Advisory DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install --quiet pip-audit
      - name: Audit runtime lockfile
        run: pip-audit -r requirements.txt --strict
      - name: Audit dev lockfile
        run: pip-audit -r requirements-dev.txt --strict
